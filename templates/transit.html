<!doctype=html>
	<script type='text/javascript'>
		function fetchUpdates() {
			fetch("/playback-data").then((response) => response.json()).then((result) => {
				spotify_data = JSON.parse(JSON.stringify(result));
				if (spotify_data["status_code"] == 204 || (spotify_data["status_code"] == 200 && !spotify_data["is_playing"])) {
					fetch("/transit-times").then((response) => response.json()).then((result) => {
						time_data = JSON.parse(JSON.stringify(result));
						for (var station in time_data) {
							for (var dest in time_data[station]) {
								if (JSON.stringify(time_data[station][dest]) == '{}') {
									document.getElementById(station.concat(dest)).innerHTML = 'To ' + dest + ':' + '<br>No Departures';
								}
								else {
									document.getElementById(station.concat(dest)).innerHTML = 'To ' + time_data[station][dest]['hS'] + ':' + '<br>' + time_data[station][dest]['tTA'];
								}
							}
						}
					})
				}
				else {
					window.location.replace("/spotify")
				}
			});
		}
		function startTime() {
			const today = new Date();
			let h = today.getHours();
			let m = today.getMinutes();
			let s = today.getSeconds();
			m = checkTime(m);
			s = checkTime(s);
			document.getElementById('time').innerHTML = h + ":" + m + ":" + s;
			setTimeout(startTime, 1000);
		}
		function checkTime(i) {
			if (i < 10) { i = "0" + i };  // add zero in front of numbers < 10
			return i;
		}
		function getCSSRule(ruleName) {
			ruleName = ruleName.toLowerCase();
			var result = null;
			var find = Array.prototype.find;

			find.call(document.styleSheets, styleSheet => {
				result = find.call(styleSheet.cssRules, cssRule => {
					return cssRule instanceof CSSStyleRule
						&& cssRule.selectorText.toLowerCase() == ruleName;
				});
				return result != null;
			});
			return result;
		}
		function resizeBox() {
			var box = getCSSRule(".box");
			var width = document.querySelector(".lines").clientWidth;
			var height = document.querySelector(".lines").clientHeight;
			if (width < height) {
				if (width > 125) {
					box.style.width = 125;
					box.style.height = 125;
				}
				else {
					box.style.width = width;
					box.style.height = width;
				}
			}
			else {
				if (height > 125) {
					box.style.width = 125;
					box.style.height = 125;
				}
				else {
					box.style.width = height;
					box.style.height = height;
				}
			}
		}
		window.addEventListener("load", myInit, true); function myInit() {
			startTime();
			setInterval(fetchUpdates, 20000);
			resizeBox();
		}
		window.addEventListener("resize", onResize); function onResize() {
			var box = getCSSRule(".box");
			box.style.width = 0;
			box.style.height = 0;
			resizeBox();
		}
	</script>
	<style>
		body {
			background-color: black;
			display: flex;
			flex-direction: column;
			height: 98vh;
			width: 98vw;
			justify-content: center;
			align-items: center;
		}

		.clock {
			flex: 5;
			color: white;
			align-self: center;
			font-size: 7vmin;
		}

		#time {
			margin: 0;
		}

		.rows {
			display: flex;
			flex-direction: column;
			flex: 95;
			margin: 0vmin 3vmin 1vmin 3vmin;
			justify-content: center;
			align-items: center;
		}

		.row {
			display: flex;
			flex-direction: column;
			flex: 1;
			margin: 1vmin;
			justify-content: stretch;
			align-items: stretch;
			width: 98vw;
		}

		.box {
			border-radius: 50%;
			background-color: #11117D;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 0;
			width: 0;
		}

		.text-wrapper {
			display: flex;
			flex: 40;
			flex-direction: row;
			color: white;
			justify-content: center;
			align-items: center;
			margin: 1vh;
		}

		.text {
			display: flex;
			flex: 1;
			margin-left: 1vw;
			margin-right: 1vw;
			justify-content: center;
			align-items: center;
		}

		.lines {
			display: flex;
			flex: 60;
			width: 100%;
			color: white;
			justify-content: center;
			align-items: center;
		}

		.line_name {
			font-weight: bold;
			font-family: sans-serif;
			font-weight: 800;
			font-size: 11vmin;
			background-color: #0e95d0;
			border-radius: 25px;
			padding: 2vh;
			text-align: center;
			margin: 0;
		}

		.subway_logo {
			font-size: 11vmin;
			font-family: sans-serif;
			color: white;
			margin: 0;
			text-align: center;
			font-weight: bold;
		}

		.timesWTC {
			font-size: 6vmin;
			margin: 0;
			padding: 2vh;
			text-align: center;
			background-color: red;
			border-radius: 25px;
		}

		.times33S {
			font-size: 6vmin;
			margin: 0;
			padding: 2vh;
			border-radius: 25px;
			text-align: center;
			background-color: orange;
		}
	</style>

	<body>
		<div class="clock">
			<p id="time"></p>
		</div>
		<div class="rows">
			{% for i in lines %}
			<div class="row" id="{{i}}">
				<div class="lines">
					<p class='line_name'>{{i}}</p>
				</div>
				<div class="text-wrapper">
					{% for j in lines[i] %}
					<div class="text">
						<p class="{{'times'~j}}" id="{{i~j}}">{% if lines[i][j]|length == 0 %}To {{ j }}:<br>No
							Departures
							{% else %}To {{ lines[i][j]['hS'] }}:<br>{{ lines[i][j]['tTA'] }}{% endif %}</p>
					</div>
					{% endfor %}
				</div>
			</div>
			{% endfor %}
		</div>
	</body>

<!doctype=html>
	<meta charset="UTF-8">
	<script type='text/javascript'>
		function fetchUpdates() {
			fetch("/transit-times").then((response) => response.json()).then((result) => {
				time_data = JSON.parse(JSON.stringify(result));
				for (var station in time_data) {
					for (var dest in time_data[station]) {
						if (JSON.stringify(time_data[station][dest]) == '{}') {
							if (dest == '33S') {
								document.getElementById(station.concat(dest)).innerHTML = 'To 33rd St:' + '<br>No Departures';
							}
							else {
								document.getElementById(station.concat(dest)).innerHTML = 'To ' + dest + ':' + '<br>No Departures';
							}
						}
						else {
							document.getElementById(station.concat(dest)).innerHTML = 'To ' + time_data[station][dest]['hS'] + ':' + '<br>' + time_data[station][dest]['tTA'];
						}
					}
				}
			})
		}
		function updateWeather() {
			fetch("/weather").then((response) => response.json()).then((result) => {
				weather_data = JSON.parse(JSON.stringify(result));
				document.getElementById("temp").innerHTML = '&#' + weather_data['weather'] + ' ' + weather_data['temp'] + '&deg';
			})
		}
		function startTime() {
			const today = new Date();
			let h = today.getHours();
			let m = today.getMinutes();
			let s = today.getSeconds();
			m = checkTime(m);
			s = checkTime(s);
			document.getElementById('time').innerHTML = h + ":" + m + ":" + s;
			setTimeout(startTime, 1000);
		}
		function checkTime(i) {
			if (i < 10) { i = "0" + i };  // add zero in front of numbers < 10
			return i;
		}
		function getCSSRule(ruleName) {
			ruleName = ruleName.toLowerCase();
			var result = null;
			var find = Array.prototype.find;

			find.call(document.styleSheets, styleSheet => {
				result = find.call(styleSheet.cssRules, cssRule => {
					return cssRule instanceof CSSStyleRule
						&& cssRule.selectorText.toLowerCase() == ruleName;
				});
				return result != null;
			});
			return result;
		}
		function resizeBox() {
			var box = getCSSRule(".box");
			var width = document.querySelector(".lines").clientWidth;
			var height = document.querySelector(".lines").clientHeight;
			if (width < height) {
				if (width > 125) {
					box.style.width = 125;
					box.style.height = 125;
				}
				else {
					box.style.width = width;
					box.style.height = width;
				}
			}
			else {
				if (height > 125) {
					box.style.width = 125;
					box.style.height = 125;
				}
				else {
					box.style.width = height;
					box.style.height = height;
				}
			}
		}
		window.addEventListener("load", myInit, true); function myInit() {
			startTime();
			updateWeather();
			setInterval(fetchUpdates, 20000);
			setInterval(updateWeather, 300000);
			resizeBox();
		}
		window.addEventListener("resize", onResize); function onResize() {
			var box = getCSSRule(".box");
			box.style.width = 0;
			box.style.height = 0;
			resizeBox();
		}
	</script>
	<style>
		body {
			background-color: black;
			display: flex;
			flex-direction: column;
			height: 98vh;
			width: 98vw;
			justify-content: center;
			align-items: center;
		}

		.clock {
			flex: 5;
			color: white;
			align-self: center;
			font-size: 7vmin;
		}

		#time {
			margin: 0;
		}

		.weather {
			flex: 5;
			color: white;
			font-weight: bold;
			font-family: sans-serif;
			font-weight: 800;
			font-size: 8vmin;
			border-radius: 25px;
			text-align: center;
			margin: 0;
		}

		#temp {
			margin: 0;
		}

		.rows {
			display: flex;
			flex-direction: column;
			flex: 90;
			margin: 0vmin 2vmin 1vmin 2vmin;
			justify-content: center;
			align-items: center;
		}

		.row {
			display: flex;
			flex-direction: column;
			flex: 1;
			justify-content: center;
			align-items: center;
			margin: 1vmin;
		}

		.text-wrapper {
			display: flex;
			flex-direction: row;
			color: white;
			justify-content: center;
			align-items: center;
			margin: 0;
		}

		.text {
			display: flex;
			margin: 2vmin;
			justify-content: center;
			align-items: center;
		}

		.lines {
			display: flex;
			width: 100%;
			color: white;
			justify-content: center;
			align-items: center;
			margin-top: 1vmin;
			margin-bottom: 2vmin;
		}

		.line_name {
			font-weight: bold;
			font-family: sans-serif;
			font-weight: 800;
			font-size: 8vmin;
			background-color: #0e95d0;
			border-radius: 25px;
			padding: 2vmin;
			text-align: center;
			margin: 0;
		}

		.timesWTC {
			font-size: 6vmin;
			margin: 0;
			padding: 2vmin;
			text-align: center;
			background-color: red;
			border-radius: 25px;
		}

		.times33S {
			font-size: 6vmin;
			margin: 0;
			padding: 2vmin;
			border-radius: 25px;
			text-align: center;
			background-color: orange;
		}

		.timesNWK {
			font-size: 6vmin;
			margin: 0;
			padding: 2vmin;
			text-align: center;
			background-color: red;
			border-radius: 25px;
		}
	</style>

	<body>
		<div class="clock">
			<p id="time"></p>
		</div>
		<div class="weather">
			<p id="temp">&deg</p>
		</div>
		<div class="rows">
			{% for i in lines %}
			<div class="row" id="{{i}}">
				<div class="lines">
					<p class='line_name'>{{i}}</p>
				</div>
				{% for n in lines[i]|batch(2) %}
				<div class="text-wrapper">
					{% for j in n %}
					<div class="text">
						<p class="{{'times'~j}}" id="{{i~j}}">{% if lines[i][j]|length == 0 %}To {{ j }}:<br>No
							Departures
							{% else %}To {{ lines[i][j]['hS'] }}:<br>{{ lines[i][j]['tTA'] }}{% endif %}</p>
					</div>
					{% endfor %}
				</div>
				{% endfor %}
			</div>
			{% endfor %}
		</div>
	</body>
